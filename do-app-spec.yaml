alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- engine: PG
  name: dev-db-trek
  version: "17"
ingress:
  rules:
  - component:
      name: trek-planner
    match:
      path:
        prefix: /
name: trek
region: fra
services:
- dockerfile_path: Dockerfile
  github:
    branch: main
    deploy_on_push: true
    repo: jakubtrcka/trek-planner
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  name: trek-planner
  source_dir: /
